<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nordic Screener</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- AG Grid -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.3/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.3/styles/ag-theme-alpine.css">

  <!-- App CSS -->
  <link rel="stylesheet" href="/static/css/style.css">

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
</head>
<body>
  <div id="app" x-data="screenerApp">

    <!-- ── Top Bar ── -->
    <div class="topbar">
      <div class="logo">NORDIC SCREENER</div>

      <div class="country-tabs">
        <button class="country-tab" :class="{ active: !filters.country }"
                @click="setCountry(null)">ALL</button>
        <button class="country-tab" :class="{ active: filters.country === 'SE' }"
                @click="setCountry('SE')">SE</button>
        <button class="country-tab" :class="{ active: filters.country === 'DK' }"
                @click="setCountry('DK')">DK</button>
        <button class="country-tab" :class="{ active: filters.country === 'FI' }"
                @click="setCountry('FI')">FI</button>
        <button class="country-tab" :class="{ active: filters.country === 'NO' }"
                @click="setCountry('NO')">NO</button>
      </div>

      <select class="sector-select" x-model="filters.sector" @change="fetchScreener()">
        <option value="">All Sectors</option>
        <template x-for="s in sectors" :key="s">
          <option :value="s" x-text="s"></option>
        </template>
      </select>

      <div class="search-box">
        <input type="text" placeholder="Search ticker or name..."
               x-model.debounce.300ms="filters.search"
               @input="fetchScreener()">
      </div>

      <button class="expand-btn" @click="tableExpanded = !tableExpanded"
              :title="tableExpanded ? 'Show charts' : 'Expand table'">
        <span x-text="tableExpanded ? '◂▸' : '▸◂'"></span>
      </button>

      <div class="stock-count">
        <span x-text="total"></span> stocks
      </div>
    </div>

    <!-- ── Main Content ── -->
    <div class="main-content" :class="{ 'detail-open': selectedTicker, 'table-expanded': tableExpanded }">

      <!-- Table Panel -->
      <div class="table-panel">
        <div id="stock-grid" class="ag-theme-alpine-dark" style="width:100%;height:100%;"></div>
      </div>

      <!-- Chart Panel -->
      <div class="chart-panel">
        <template x-if="selectedTicker">
          <div style="display:flex;flex-direction:column">
            <!-- Top: Price chart + ratio mini-charts -->
            <div class="chart-area">
              <div class="chart-container">
                <div class="chart-header">
                  <span class="chart-title" x-text="selectedTicker + ' — Price'"></span>
                  <div class="period-tabs">
                    <template x-for="p in ['1m','3m','6m','1y','2y','5y','10y','max']" :key="p">
                      <button class="period-tab" :class="{ active: chartPeriod === p }"
                              @click="setChartPeriod(p)" x-text="p"></button>
                    </template>
                  </div>
                </div>
                <div class="price-chart-wrap" id="price-chart"></div>
              </div>
              <div class="ratio-charts-sidebar">
                <div class="ratio-mini"><h5>P/E</h5><canvas id="ratio-pe-chart"></canvas></div>
                <div class="ratio-mini"><h5>P/S</h5><canvas id="ratio-ps-chart"></canvas></div>
              </div>
            </div>
            <!-- Bottom: 4 financial bar charts -->
            <div class="financials-section">
              <div class="fin-chart-wrap"><h4>Net Sales</h4><canvas id="revenue-chart"></canvas></div>
              <div class="fin-chart-wrap"><h4>Revenue Growth</h4><canvas id="growth-chart"></canvas></div>
              <div class="fin-chart-wrap"><h4>Earnings/Share</h4><canvas id="eps-chart"></canvas></div>
              <div class="fin-chart-wrap"><h4>Profit Margin</h4><canvas id="margin-chart"></canvas></div>
            </div>
          </div>
        </template>
        <template x-if="!selectedTicker">
          <div class="empty-state">
            <div class="icon">◆</div>
            <div>Select a stock to view chart</div>
          </div>
        </template>
      </div>

      <!-- Detail Panel -->
      <template x-if="selectedTicker && companyData">
        <div class="detail-panel">
          <div class="detail-header">
            <button class="detail-close" @click="closeDetail()">&times;</button>
            <div class="detail-name" x-text="companyData.name"></div>
            <div class="detail-ticker" x-text="companyData.ticker"></div>
            <div class="detail-price-row">
              <span class="detail-price" x-text="fmt(companyData.price)"></span>
              <span class="detail-change"
                    :class="companyData.change_pct >= 0 ? 'text-positive' : 'text-negative'"
                    x-text="(companyData.change_pct >= 0 ? '+' : '') + fmt(companyData.change_pct) + '%'">
              </span>
            </div>
          </div>

          <div class="detail-meta">
            <span x-text="'Sector: ' + (companyData.sector || '—')"></span>
            <span x-text="'Industry: ' + (companyData.industry || '—')"></span>
            <span x-text="'Country: ' + (companyData.country || '—')"></span>
            <span x-text="'MCap: ' + fmtLarge(companyData.market_cap)"></span>
          </div>

          <div class="detail-description" x-text="companyData.description || 'No description available.'"></div>

          <div class="ratios-section">
            <div class="ratios-title">Key Ratios</div>
            <div class="ratios-grid">
              <div class="ratio-card">
                <div class="ratio-label">P/E</div>
                <div class="ratio-value" x-text="fmt(companyData.pe)"></div>
              </div>
              <div class="ratio-card">
                <div class="ratio-label">P/B</div>
                <div class="ratio-value" x-text="fmt(companyData.pb)"></div>
              </div>
              <div class="ratio-card">
                <div class="ratio-label">P/S</div>
                <div class="ratio-value" x-text="fmt(companyData.ps)"></div>
              </div>
              <div class="ratio-card">
                <div class="ratio-label">EV/EBITDA</div>
                <div class="ratio-value" x-text="fmt(companyData.ev_ebitda)"></div>
              </div>
              <div class="ratio-card">
                <div class="ratio-label">Div Yield</div>
                <div class="ratio-value" x-text="fmtPct(companyData.div_yield)"></div>
              </div>
              <div class="ratio-card">
                <div class="ratio-label">ROE</div>
                <div class="ratio-value" x-text="fmtPct(companyData.roe)"></div>
              </div>
              <div class="ratio-card">
                <div class="ratio-label">Margin</div>
                <div class="ratio-value" x-text="fmtPct(companyData.margin)"></div>
              </div>
              <div class="ratio-card">
                <div class="ratio-label">EPS</div>
                <div class="ratio-value" x-text="fmt(companyData.eps)"></div>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- AG Grid -->
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.3/dist/ag-grid-community.min.js"></script>
  <!-- TradingView Lightweight Charts -->
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <script src="/static/js/table.js"></script>
  <script src="/static/js/chart.js"></script>
  <script src="/static/js/financials.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>

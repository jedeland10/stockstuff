name: Test & Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stockdata
          POSTGRES_USER: stockdata
          POSTGRES_PASSWORD: stockdata
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockdata"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://stockdata:stockdata@localhost:5432/stockdata
        run: python -m pytest tests/ -v --tb=short

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            DEPLOY_PATH=${{ secrets.VPS_DEPLOY_PATH }}

            # Clone if first deploy, pull if exists
            if [ ! -d "$DEPLOY_PATH" ]; then
              git clone https://github.com/${{ github.repository }}.git "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"
            git pull origin main

            # Rebuild and restart (pgdata volume persists)
            docker compose down
            docker compose build --no-cache app
            docker compose up -d
